version: 1
mission: "Deploy any VLA model to any edge hardware. One command."

goals:
  # ── CRITICAL (weight 10) ──────────────────────────────────────────

  - id: vlm-prefix-encoder
    description: "VLM backbone exports as real SigLIP+SmolLM2 ONNX (not stub) with vlm_kv_dim=960 so /act returns task-conditioned actions"
    check: "test -f src/reflex/exporters/vlm_prefix_exporter.py && grep -q 'AutoModel\\|from_pretrained' src/reflex/exporters/vlm_prefix_exporter.py 2>/dev/null && ! grep -q 'AdaptiveAvgPool2d' src/reflex/exporters/vlm_prefix_exporter.py 2>/dev/null"
    weight: 10

  - id: text-embedder-onnx
    description: "reflex export produces text_embedder.onnx (real SmolLM2 embed_tokens) so text encoding uses real embeddings not seeded-random fallback"
    check: "grep -q 'text_embedder' src/reflex/exporters/vlm_prefix_exporter.py 2>/dev/null && grep -q 'embed_tokens' src/reflex/exporters/vlm_prefix_exporter.py 2>/dev/null"
    weight: 10

  # ── HIGH (weight 8-9) ─────────────────────────────────────────────

  - id: distill-dmpo
    description: "reflex distill implements DMPO one-step generation (no teacher) targeting 1000+ Hz on consumer GPUs"
    check: "test -f src/reflex/distill/dmpo.py && .venv/bin/python -c 'from reflex.distill.dmpo import DMPOTrainer' 2>/dev/null"
    weight: 9

  - id: multi-model-native-parity
    description: "Native export path with cos=1.0000 parity on SmolVLA AND pi0 AND pi0.5 AND GR00T (not just SmolVLA). Same DecomposedRMSNorm-swap pattern, 4x the moat."
    check: "test -f tests/test_native_parity.py && .venv/bin/python -m pytest tests/test_native_parity.py -q 2>/dev/null"
    weight: 9

  - id: jetson-benchmark-ci
    description: "GitHub Action runs reflex bench on real Jetson hardware (CloudJetson or loaner) every commit, publishes ms/step per target to a public dashboard. Turns Leg B from static claim into per-commit proof."
    check: "test -f .github/workflows/jetson-bench.yml"
    weight: 9

  - id: ros2-bridge
    description: "reflex serve --ros2 wraps the HTTP endpoint with a thin rclpy action server for native ROS2 integration"
    check: "grep -q 'ros2' src/reflex/runtime/server.py 2>/dev/null || test -f src/reflex/runtime/ros2_bridge.py"
    weight: 8

  - id: calibration-metrics
    description: "reflex eval --calibration computes ECE + Brier + NLL on any lerobot dataset — the one non-sim metric with a monotonic link to real-task success (Zollo 2025). Differentiator vs other VLA deployment tools."
    check: "test -f src/reflex/eval/calibration.py && .venv/bin/python -c 'from reflex.eval.calibration import compute_ece, compute_brier, compute_nll' 2>/dev/null"
    weight: 8

  - id: prefix-kv-cache-reuse
    description: "reflex serve --cache-prefix reuses VLM prefix K/V across the 10-step denoise loop and multi-step rollouts. Dexmal 2510.26742 showed this unlocks 5-10x throughput for production trajectory serving."
    check: "grep -q 'prefix_cache\\|cache_prefix' src/reflex/runtime/server.py 2>/dev/null"
    weight: 8

  # ── MEDIUM-HIGH (weight 7) ────────────────────────────────────────

  - id: nan-guard-hardening
    description: "Guard rejects NaN/Inf actions and halts after N consecutive clamps (staleness kill-switch)"
    check: "grep -q 'nan' src/reflex/safety/guard.py 2>/dev/null && grep -q 'staleness\\|stale' src/reflex/safety/guard.py 2>/dev/null"
    weight: 7

  - id: xvla-exporter
    description: "reflex export auto-detects and exports xVLA (880M, tokenized action head) to ONNX"
    check: "test -f src/reflex/exporters/xvla_exporter.py && .venv/bin/python -c 'from reflex.exporters.xvla_exporter import export_xvla' 2>/dev/null"
    weight: 7

  - id: api-key-auth
    description: "reflex serve --api-key enables X-Reflex-Key header auth that rejects unauthenticated requests with 401"
    check: "grep -q 'api.key\\|api_key\\|X-Reflex-Key' src/reflex/runtime/server.py 2>/dev/null"
    weight: 7

  - id: action-chunk-buffering
    description: "reflex serve --replan-hz N --execute-hz M handles async replan-while-execute with a ring buffer. Real production pattern (Physical Intelligence uses it) — robots execute at 100Hz, VLAs plan at 20Hz."
    check: "grep -q 'replan_hz\\|sliding_window\\|action_buffer' src/reflex/runtime/server.py 2>/dev/null"
    weight: 7

  - id: docker-image-distribution
    description: "ghcr.io/rylinjames/reflex:<version>-<target> images published per release. Zero-install path: docker pull + docker run. Images for orin-nano, orin, thor, desktop. MVP-adoption tablestakes — first-hour experience goes from 4 hours of install to 60 seconds."
    check: "test -f .github/workflows/docker-publish.yml"
    weight: 7

  # ── MEDIUM (weight 5-6) ───────────────────────────────────────────

  - id: latency-histograms
    description: "/act response includes latency_p50, latency_p95, latency_p99, jitter_ms fields"
    check: "grep -q 'latency_p95\\|p95' src/reflex/runtime/server.py 2>/dev/null"
    weight: 6

  - id: stripe-license-gating
    description: "Stripe subscription verification gates Pro-tier features (distill, fleet batching) behind a valid license key. Revenue feature — not a moat piece, just a wrapper."
    check: "test -f src/reflex/licensing.py && .venv/bin/python -c 'from reflex.licensing import verify_license' 2>/dev/null"
    weight: 6

  - id: export-verification-report
    description: "Every reflex export auto-writes <export_dir>/VERIFICATION.md with per-stage cos, L2, max_abs, ONNX sizes, opset, target-hardware compat, provenance hash. 'Ship a receipt, not just a binary.'"
    check: "grep -q 'VERIFICATION.md\\|verification_report' src/reflex/exporters/*.py 2>/dev/null"
    weight: 6

  - id: quickstart-docs
    description: "README front page delivers 3-command quickstart (install / export / serve) that works on a fresh box in under 5 minutes. Plus docs/getting_started.md covering the 5 most common customer scenarios. MVP-adoption tablestakes."
    check: "test -f docs/getting_started.md && grep -q 'Quickstart' README.md && grep -c '```bash' docs/getting_started.md | grep -q '[3-9]'"
    weight: 6

  - id: adaptive-denoise-fix
    description: "Adaptive denoising works on pi0 (supported), is gated behind --experimental for smolvla/pi0.5/gr00t (unsafe)"
    check: "grep -q 'experimental\\|EXPERIMENTAL' src/reflex/kernels/turbo.py 2>/dev/null"
    weight: 5

  - id: determinism-version-hash
    description: "Every /act response includes model_hash, config_hash, reflex_version for reproducible debugging"
    check: "grep -q 'model_hash' src/reflex/runtime/server.py 2>/dev/null"
    weight: 5

  # ── LOW (weight 3-4) ──────────────────────────────────────────────

  - id: inference-test-coverage
    description: "Unit tests for inference.py and individual exporter modules (currently zero direct coverage)"
    check: "test -f tests/test_inference.py && .venv/bin/python -m pytest tests/test_inference.py -q --tb=no 2>/dev/null"
    weight: 4

  - id: openvla-exporter
    description: "reflex export auto-detects and exports OpenVLA (7.5B, tokenized head) beyond the current stub"
    check: "grep -c 'def export_openvla' src/reflex/exporters/openvla_exporter.py 2>/dev/null | grep -q '[1-9]'"
    weight: 4

  - id: sqlite-audit-log
    description: "reflex serve --audit-db appends every /act call to a SHA-256 hash-chain SQLite log"
    check: "test -f src/reflex/safety/audit_log.py && .venv/bin/python -c 'from reflex.safety.audit_log import AuditLog' 2>/dev/null"
    weight: 3

  # ── REGRESSION GATE (runs after every /evolve cycle) ──────────────

  - id: native-path-parity
    description: "Native export path (lerobot SmolVLAPolicy + DecomposedRMSNorm) matches PyTorch reference to cos=1.0000 end-to-end. The one load-bearing number for reflex's deployment-parity claim."
    check: "test -f src/reflex/runtime/smolvla_native.py && test -f scripts/local_full_diff.py && REFLEX_NATIVE=1 .venv/bin/python scripts/local_full_diff.py 2>&1 | grep -q 'cos=+1.000'"
    weight: 10
